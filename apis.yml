aid: johnson-and-johnson
name: Johnson & Johnson
description: Johnson & Johnson is a multinational pharmaceutical and medical devices corporation. Operating today as Johnson
  & Johnson Innovative Medicine and MedTech, J&J has historically connected health platforms and APIs through subsidiaries
  such as LifeScan (OneTouch blood glucose monitoring), which was divested to Platinum Equity in 2018 and continues to operate
  the LifeScan developer portal referenced here. Consumer health brands (Tylenol, Listerine, Neutrogena, Band-Aid) were spun
  out as Kenvue in 2023 and are tracked in a separate kenvue index.
