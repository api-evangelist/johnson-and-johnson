notes: Johnson & Johnson does not publish a public-facing developer API program with tiered
  pricing. Integration surfaces (clinical-trial data, MedTech device telemetry, supplier and
  procurement APIs) are exposed through bilateral B2B agreements. Reconciliation blocked
  pending public pricing or partner-program rate sheet.
tags:
  - Healthcare
  - Medical Devices
  - Diabetes
  - Blood Glucose
  - Pharmaceuticals
description: Plans artifact for Johnson & Johnson integration surfaces. J&J operates as a
  multi-segment healthcare company (Innovative Medicine, MedTech) and does not market public
  developer plans; access is contractual and segment-specific.
sources:
  - https://www.jnj.com/
plans:
  - id: johnson-and-johnson-enterprise-integration
    name: Enterprise Integration
    type: enterprise
    description: Bilateral integration agreement covering specific J&J business surfaces
      (e.g. supplier portals, MedTech device data, clinical-trial data sharing). No public
      pricing; commercial terms negotiated with the relevant J&J operating company.
    entries:
      - label: API Access
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Business-segment integration agreement required
      - name: Per-surface scope (Innovative Medicine, MedTech, Supply Chain)
      - name: Compliance and data-protection review (HIPAA / GDPR / FDA as applicable)
