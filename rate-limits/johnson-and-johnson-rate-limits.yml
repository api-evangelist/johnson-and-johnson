specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Johnson & Johnson
providerId: johnson-and-johnson
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Johnson & Johnson does not publish public rate-limit documentation. Limits, if any,
  apply within bilateral B2B integrations and are governed by the integration contract.
  Reconciliation blocked pending public documentation.
tags:
  - Healthcare
  - Medical Devices
  - Diabetes
  - Blood Glucose
  - Pharmaceuticals
  - Rate Limiting
description: Rate-limit artifact for Johnson & Johnson integration surfaces. No public per-second
  / per-minute limits are documented; runtime throttling is contract-defined.
sources:
  - https://www.jnj.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Contract-defined throttle
    scope: integration-contract
    metric: varies
    limit: see bilateral integration agreement
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 / 503 responses
      and honor the Retry-After header when present.
  - name: Contract-Provisioned Limits
    description: Rate limits, where they exist, are scoped to the bilateral integration
      contract with the relevant J&J operating company.
maintainers:
